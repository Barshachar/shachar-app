name: Codex Auto Review

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize, labeled]

jobs:
  request:
    # trigger on any PR event; if it is a label event, only when label == codex-review
    if: ${{ github.event.action != "labeled" || (github.event.action == "labeled" && github.event.label.name == "codex-review") }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post @codex review (once per head SHA)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;
            const marker = `<!-- codex-auto ${sha} -->`;

            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            if (comments.some(c => c.body && c.body.includes(marker))) {
              core.info("Codex review comment already posted for this head SHA.");
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number,
                body: `${marker}\n@codex review`
              });
              core.info("Posted @codex review trigger.");
            }
