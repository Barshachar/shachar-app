name: Flutter CI

on:
  push:
    paths:
      - 'app/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/flutter.yml'
  workflow_dispatch:

jobs:
  analyze_unit:
    name: analyze+unit
    runs-on: ubuntu-latest
    if: ${{ vars.RUN_FLUTTER_CI == "1" }}
    continue-on-error: true
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter unit tests
        run: flutter test -r compact

  integration_macos:
    name: Integration (macOS manual)
    if: ${{ vars.RUN_FLUTTER_CI == "1" && github.event_name == 'workflow_dispatch' }}
    needs: analyze_unit
    runs-on: macos-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Integration test (order flow)
        run: flutter test integration_test/order_flow_test.dart \
          -r expanded \
          --dart-define=ENV=dev \
          --dart-define=INITIAL_ROUTE=/home

      - name: macOS runners note
        run: echo "macOS integration job runs only via workflow_dispatch when macOS runners are available."

  qa_orders_soft_gate:
    name: QA Orders Screenshots (soft gate)
    needs: analyze_unit
    if: ${{ vars.RUN_FLUTTER_CI == "1" }}
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Run QA orders harness
        run: ./scripts/qa-run.sh

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-orders-${{ github.run_id }}
          path: |
            app/build/qa/logs/*.log
            app/docs/screens/orders/*.png
