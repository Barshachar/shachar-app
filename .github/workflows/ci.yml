name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  flutter:
    name: Flutter (apps/b2b_flutter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter pub get
        working-directory: apps/b2b_flutter
        run: flutter pub get
      - name: Flutter analyze
        working-directory: apps/b2b_flutter
        run: flutter analyze
      - name: Flutter tests
        working-directory: apps/b2b_flutter
        run: flutter test

  web:
    name: Web PWA (apps/web_pwa)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/web_pwa/package-lock.json
      - name: Install dependencies
        working-directory: apps/web_pwa
        run: npm ci
      - name: Lint
        working-directory: apps/web_pwa
        run: npm run lint
      - name: Tests
        working-directory: apps/web_pwa
        run: npm test

  edge:
    name: Supabase Edge Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.46
      - name: Run Deno tests
        run: deno test supabase/functions
