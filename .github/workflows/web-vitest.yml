name: Web Vitest
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ codex/** ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: apps/web_pwa/package-lock.json
      - name: Install
        working-directory: apps/web_pwa
        run: npm ci
      - name: Vitest
        working-directory: apps/web_pwa
        run: npx vitest run
