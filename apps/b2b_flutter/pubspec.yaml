name: ashachar_marketplace
description: B2B multi-vendor marketplace for א.שחר built with Flutter and Supabase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Needed because presentation/tests import PostgrestException explicitly
  postgrest: ^2.1.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  crypto: ^3.0.3
  flutter_riverpod: ^3.0.0
  hooks_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0
  state_notifier: ^1.0.0
  go_router: ^16.2.2
  supabase_flutter: ^2.5.4
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  dio: ^5.4.3
  collection: ^1.18.0
  equatable: ^2.0.5
  flutter_hooks: ^0.21.3+1
  flex_color_scheme: ^8.2.0
  responsive_framework: ^1.2.0
  google_fonts: ^6.2.1
  package_info_plus: ^9.0.0
  shared_preferences: ^2.5.3
  path_provider: ^2.1.3
  connectivity_plus: ^7.0.0
  riverpod: ^3.0.0
  logging: ^1.2.0
  sentry_flutter: ^9.6.0
  flutter_barcode_scanner: ^2.0.0
  camera: ^0.11.2
  url_launcher: ^6.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  drift: ^2.14.0
  drift_flutter: ^0.2.6
  sqlite3_flutter_libs: ^0.5.0
  workmanager: ^0.9.0+3
  firebase_core: ^4.1.0
  firebase_messaging: ^16.0.1
  file_picker: ^10.3.3
  mobile_scanner: ^7.0.1
  design_system:
    path: ../../packages/dart/design_system
  offline_toolkit:
    path: ../../packages/dart/offline_toolkit

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.3
  build_runner: ^2.7.1
  riverpod_generator: ^3.0.0
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  integration_test:
    sdk: flutter
  golden_toolkit: ^0.15.0
  url_launcher_platform_interface: ^2.3.2
  web_socket_channel: ^3.0.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env.json
    - assets/config/app_config.json
    - assets/translations/
    - assets/config/
